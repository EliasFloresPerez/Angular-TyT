<div class="container">
  <div class="header">
    <h2>Clientes</h2>
    <button mat-raised-button color="primary" class="crear-btn" (click)="crearCliente()">Crear Cliente</button>
  </div>

  <div *ngIf="vm.loading$ | async" class="loading">Cargando clientes...</div>

  <table mat-table [dataSource]="(vm.clients$ | async) || []" class="clientes-table">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let c">{{ c.name }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let c">{{ c.email }}</td>
    </ng-container>

    <ng-container matColumnDef="phone">
      <th mat-header-cell *matHeaderCellDef>Teléfono</th>
      <td mat-cell *matCellDef="let c">{{ c.phone }}</td>
    </ng-container>

    <ng-container matColumnDef="address">
      <th mat-header-cell *matHeaderCellDef>Dirección</th>
      <td mat-cell *matCellDef="let c">{{ c.address }}</td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Creado</th>
      <td mat-cell *matCellDef="let c">{{ c.createdAt | date:'short' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let c" class="actions-cell">
        <button mat-icon-button color="accent" (click)="editarCliente(c.id)" matTooltip="Editar">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="eliminarCliente(c.id)" matTooltip="Eliminar">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['name', 'email', 'phone', 'address', 'createdAt', 'actions']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['name', 'email', 'phone', 'address', 'createdAt', 'actions'];"></tr>
  </table>

  <div *ngIf="vm.error$ | async as error" class="error-message">
    {{ error }}
  </div>
</div>
